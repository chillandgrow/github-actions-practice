name: Python Demo

on:
  pull_request: 
    branches: main

jobs:
  build:
    
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
         
      - name: Run python file
        run: python app.py
  
