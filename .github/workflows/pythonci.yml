name: Python Demo

on:
  pull_request: 
    branches: main
  push:
    branches: main

jobs:
  build:
    
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
         
      - name: Run python file
        run: python app.py

      - name: Install pytest
        run: pip install pytest

      - name: Run test
        run: pytest

      - name: Build image
        run:  docker build -t sne16/github-actions-practice:v1 .

      - name: Login to docker
        run: |
          echo "${{ secrets.GITHUB_PASSWORD}}" | docker login -u "${{ secrets.GITHUB_USERNAME}}" --password-stdin
      - name: Push docker image
        run: docker push sne16/github-actions-practice:v1